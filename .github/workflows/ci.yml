name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Node.js 22 validation
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Type-check, test, and enforce file budgets
        run: npm test

      - name: Measure and enforce test coverage
        run: npm run coverage

      - name: Publish coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-node-22
          path: coverage/
          if-no-files-found: error
          retention-days: 14

      - name: Audit high-severity dependency vulnerabilities
        run: npm audit --audit-level=high
