name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Node.js 22 validation (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Validate cross-shell fixtures and event-log rotation
        run: node --test tests/work-guard.test.mjs tests/event-log.test.mjs

      - name: Type-check, test, and enforce repository gates
        run: npm test

      - name: Measure and enforce test coverage
        run: npm run coverage

      - name: Publish coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-node-22-${{ matrix.os }}
          path: coverage/
          if-no-files-found: error
          retention-days: 14

      - name: Verify package contents without publishing
        run: npm pack --dry-run

      - name: Audit high-severity dependency vulnerabilities
        run: npm audit --audit-level=high
